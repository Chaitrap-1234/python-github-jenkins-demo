name: Python CI with Jenkins

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: self-hosted

    environment: development

    env:
      APP_NAME: ${{ vars.APP_NAME }}
      OWNER: ${{ vars.OWNER }}
      ENVIRONMENT: ${{ vars.ENVIRONMENT }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Display Environment Variables
        run: |
          echo "APP_NAME=$APP_NAME"
          echo "OWNER=$OWNER"
          echo "ENVIRONMENT=$ENVIRONMENT"

      - name: Execute Python Application
        run: python app.py

      - name: Verify Jenkins Configuration
        run: |
          echo "Checking Jenkins configuration..."

          if [ -z "${{ secrets.JENKINS_URL }}" ]; then
            echo "ERROR: JENKINS_URL secret is not configured."
            exit 1
          fi

          if [ -z "${{ secrets.JENKINS_USER }}" ]; then
            echo "ERROR: JENKINS_USER secret is not configured."
            exit 1
          fi

          if [ -z "${{ secrets.JENKINS_TOKEN }}" ]; then
            echo "ERROR: JENKINS_TOKEN secret is not configured."
            exit 1
          fi

          echo "Jenkins URL: ${{ secrets.JENKINS_URL }}"
          echo "Jenkins configuration looks good."

      - name: Trigger Jenkins Job
        run: |
          curl --fail \
            --user "${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_TOKEN }}" \
            -X POST \
            "${{ secrets.JENKINS_URL }}/job/PythonDemo/build"

      - name: Success
        run: echo "GitHub Actions completed successfully."
